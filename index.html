<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IJODIY ISH MARKAZI - AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-animation"></div>

    <div class="container">
        <div class="glass-card">
            <h1>IJODIY ISH MARKAZI</h1>
            
            <div class="input-group">
                <label for="work-type">Ish turini tanlang:</label>
                <select id="work-type">
                    <option value="insho">Insho (Mukammal reja va kengaytirilgan matn)</option>
                    <option value="diktant">Diktant (Imlo tekshirish uchun yaxlit matn)</option>
                    <option value="bayon">Bayon (Voqeiy hikoya ko'rinishida)</option>
                </select>
            </div>

            <div class="input-group">
                <label for="essay-topic">Mavzuni kiriting:</label>
                <input type="text" id="essay-topic" placeholder="Masalan: Vatan, Ona tili, Kitobobxonlik, Tabiat...">
            </div>
            
            <textarea id="essay-content" placeholder="Matn bu yerda paydo bo'ladi..." readonly></textarea>
            
            <div class="button-group">
                <button onclick="generateWork()" class="btn-write">Yozib ber!</button>
                <button onclick="generateWork()" class="btn-next" id="next-btn" style="display:none;">Boshqa variant</button>
                <button onclick="saveEssay()" class="btn-save">Saqlash</button>
            </div>
            
            <div id="status-msg"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
